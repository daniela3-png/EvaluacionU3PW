<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas Académicas</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1> Organizador de Tareas Universitarias</h1>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Nueva Tarea</h2>
            <form id="taskForm" novalidate>
                <div class="form-group">
                    <label for="title">Título de la Tarea:</label>
                    <input type="text" id="title" name="title" placeholder="Ej: Proyecto Web">
                    <span class="error-message" id="titleError"></span>
                </div>

                <div class="form-group">
                    <label for="description">Descripción:</label>
                    <textarea id="description" name="description" placeholder="Detalles de la entrega..."></textarea>
                    <span class="error-message" id="descriptionError"></span>
                </div>

                <div class="form-group">
                    <label for="subject">Asignatura / Ramo:</label>
                    <select id="subject" name="subject">
                        <option value="">-- Seleccione una asignatura --</option>
                        <option value="Programación WEB">Programación WEB</option>
                        <option value="Bases de Datos">Diseño de Bases de Datos</option>
                        <option value="Arquitectura de Sistemas">Programación.NET</option>
                        <option value="Diseño de Interfaces">Sistemas Operativos GNU/Linux</option>
                    </select>
                    <span class="error-message" id="subjectError"></span>
                </div>

                <div class="form-group">
                    <label for="dueDate">Fecha de Entrega:</label>
                    <input type="date" id="dueDate" name="dueDate">
                    <span class="error-message" id="dueDateError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmTitle">Confirmar Título:</label>
                    <input type="text" id="confirmTitle" name="confirmTitle" placeholder="Repita el título exactamente">
                    <span class="error-message" id="confirmTitleError"></span>
                </div>

                <button type="submit" id="submitBtn">Añadir Tarea</button>
            </form>
        </section>

        <section class="list-section">
            <h2>Mis Tareas Pendientes</h2>
            <div id="taskList" class="task-grid">
                </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
